services:
  php-apache:
    build: .
    container_name: BuyTeaCraft
    volumes:
      - ./:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: BuyTeaCraft_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: BuyTeaCraft_db
    ports:
      - "3306:3306"
    volumes:
      # mirrors local init.sql into MySQL's auto-run folder
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # preserve data when container stop
      - db_data:/var/lib/mysql
  
volumes:
  db_data: